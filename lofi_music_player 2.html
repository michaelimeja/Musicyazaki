<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lofi Vibes ☁️</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.18);
      --accent: #c9b8ff;
      --accent2: #ffd6e7;
      --text: #f0eaff;
      --subtext: rgba(240,234,255,0.6);
    }

    html, body { width:100%; height:100%; font-family:'Poppins',sans-serif; overflow:hidden; background:#1a1a2e; }

    /* ─ Background ─ */
    #bg-gif {
      position:fixed; inset:0;
      background-size:cover; background-position:center; background-repeat:no-repeat;
      transition:opacity 0.9s ease; z-index:0;
    }
    #bg-gif.fade-out { opacity:0; }
    #overlay {
      position:fixed; inset:0; z-index:1;
      background:linear-gradient(135deg,rgba(15,12,41,.58),rgba(48,43,99,.48),rgba(36,36,62,.58));
    }

    /* ─ Particles ─ */
    .particle {
      position:fixed; border-radius:50%; pointer-events:none; z-index:2;
      opacity:0; animation:float-up linear infinite;
    }
    @keyframes float-up {
      0%  { transform:translateY(100vh) scale(0); opacity:0; }
      10% { opacity:0.4; }
      90% { opacity:0.15; }
      100%{ transform:translateY(-10vh) scale(1.2); opacity:0; }
    }

    /* ─ Layout ─ */
    #app {
      position:relative; z-index:10;
      width:100%; height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:1.5rem;
    }

    /* ─ Header ─ */
    #header { text-align:center; margin-bottom:1.6rem; animation:fade-down .7s ease both; }
    .logo { font-size:.7rem; font-weight:600; letter-spacing:.35em; text-transform:uppercase; color:var(--accent); margin-bottom:.25rem; }
    #header h1 { font-size:clamp(1.5rem,4vw,2.3rem); font-weight:700; color:var(--text); text-shadow:0 2px 20px rgba(201,184,255,.4); }

    /* ─ Player Card ─ */
    #player-card {
      width:100%; max-width:390px;
      background:var(--glass-bg);
      border:1px solid var(--glass-border);
      border-radius:28px; padding:1.8rem 1.6rem 1.6rem;
      backdrop-filter:blur(26px) saturate(180%);
      -webkit-backdrop-filter:blur(26px) saturate(180%);
      box-shadow:0 8px 32px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.1) inset;
      animation:fade-up .7s .1s ease both;
    }

    /* Album Art */
    #album-art-wrap { display:flex; justify-content:center; margin-bottom:1.3rem; }
    #album-art {
      width:120px; height:120px; border-radius:50%;
      background:linear-gradient(135deg,#c9b8ff,#ffd6e7,#a8edea);
      display:flex; align-items:center; justify-content:center;
      font-size:2.8rem;
      box-shadow:0 0 0 6px rgba(201,184,255,.12),0 0 0 12px rgba(201,184,255,.06),0 8px 28px rgba(0,0,0,.45);
      animation:spin 14s linear infinite paused;
    }
    #album-art.playing { animation-play-state:running; }

    /* Song Info */
    #song-info { text-align:center; margin-bottom:1.2rem; min-height:2.8rem; }
    #song-title {
      font-size:1.05rem; font-weight:600; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:340px; margin:0 auto;
    }
    #artist-name { font-size:.76rem; color:var(--subtext); margin-top:.2rem; }

    /* Progress */
    #progress-bar-bg {
      width:100%; height:4px; background:rgba(255,255,255,.12);
      border-radius:999px; cursor:pointer; position:relative; overflow:hidden;
    }
    #progress-bar-fill {
      height:100%; width:0%; border-radius:999px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      position:relative; transition:width .4s linear;
    }
    #progress-bar-fill::after {
      content:''; position:absolute; right:-1px; top:50%;
      transform:translateY(-50%);
      width:10px; height:10px; background:#fff; border-radius:50%;
      box-shadow:0 0 6px rgba(201,184,255,.9);
    }
    #time-row { display:flex; justify-content:space-between; font-size:.66rem; color:var(--subtext); margin-top:.45rem; }

    /* Controls */
    #controls { display:flex; align-items:center; justify-content:center; gap:1.1rem; margin-top:1.3rem; }
    .ctrl-btn {
      background:none; border:none; cursor:pointer; color:var(--subtext);
      font-size:.95rem; padding:.5rem; border-radius:50%;
      transition:color .2s,transform .2s,background .2s;
      display:flex; align-items:center; justify-content:center;
      width:38px; height:38px;
    }
    .ctrl-btn:hover { color:var(--text); background:rgba(255,255,255,.08); transform:scale(1.1); }
    #play-btn {
      width:56px; height:56px;
      background:linear-gradient(135deg,var(--accent),#a78bfa);
      border-radius:50%; font-size:1.2rem; color:#fff;
      box-shadow:0 4px 20px rgba(167,139,250,.5);
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .2s, box-shadow .2s;
    }
    #play-btn:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(167,139,250,.7); }
    #play-btn:active { transform:scale(.95); }
    #play-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* Volume */
    #volume-row { display:flex; align-items:center; gap:.7rem; margin-top:1.2rem; }
    #volume-row i { color:var(--subtext); font-size:.82rem; }
    #volume-slider {
      flex:1; height:3px; cursor:pointer; appearance:none;
      background:rgba(255,255,255,.12); border-radius:999px; outline:none;
    }
    #volume-slider::-webkit-slider-thumb {
      appearance:none; width:12px; height:12px; border-radius:50%;
      background:var(--accent); box-shadow:0 0 6px rgba(201,184,255,.6);
    }

    /* Vibe Button */
    #vibe-btn {
      margin-top:1.3rem;
      background:rgba(255,255,255,.07); border:1px solid var(--glass-border);
      color:var(--text); font-family:'Poppins',sans-serif;
      font-size:.76rem; font-weight:500; letter-spacing:.07em;
      padding:.55rem 1.3rem; border-radius:999px; cursor:pointer;
      backdrop-filter:blur(8px);
      transition:background .25s, transform .2s, box-shadow .25s;
      display:flex; align-items:center; gap:.5rem;
      animation:fade-up .7s .2s ease both;
    }
    #vibe-btn:hover { background:rgba(201,184,255,.15); box-shadow:0 0 20px rgba(201,184,255,.2); transform:translateY(-1px); }
    #vibe-btn:active { transform:scale(.97); }
    #vibe-btn.loading .spin-icon { animation:spin-once .5s linear; }

    /* Footer */
    #footer { margin-top:1rem; font-size:.62rem; color:rgba(240,234,255,.28); letter-spacing:.06em; text-align:center; animation:fade-up .7s .3s ease both; }

    /* SC iframe — hidden but active */
    #sc-iframe { width:1px; height:1px; position:fixed; bottom:-5px; left:-5px; opacity:0; pointer-events:none; border:none; }

    /* Loading spinner overlay on album art */
    #loading-ring {
      position:absolute; width:120px; height:120px; border-radius:50%;
      border:3px solid transparent; border-top-color:var(--accent);
      animation:spin .8s linear infinite; display:none;
    }
    #album-art-wrap { position:relative; }

    /* Toast */
    #toast {
      position:fixed; bottom:1.5rem; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:rgba(30,20,60,.85); border:1px solid var(--glass-border);
      color:var(--text); font-size:.74rem; padding:.5rem 1.2rem;
      border-radius:999px; backdrop-filter:blur(12px);
      z-index:100; transition:transform .4s,opacity .4s;
      opacity:0; pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* Keyframes */
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes spin-once { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes fade-up { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-down { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }

    /* Responsive */
    @media(max-width:480px){
      #player-card{ padding:1.4rem 1.2rem; border-radius:22px; }
      #album-art,#loading-ring{ width:100px; height:100px; }
      #header h1{ font-size:1.4rem; }
    }
  </style>
</head>
<body>

<div id="bg-gif"></div>
<div id="overlay"></div>
<div id="particles"></div>

<!-- Hidden SoundCloud Widget iframe -->
<iframe id="sc-iframe"
  src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/sc-playlists/sets/lo-fi-chill-beats&auto_play=false&buying=false&sharing=false&download=false&show_artwork=false&show_playcount=false&show_user=false&hide_related=true&show_comments=false&color=%23c9b8ff&single_active=true"
  allow="autoplay">
</iframe>

<!-- SC Widget API -->
<script src="https://w.soundcloud.com/player/api.js"></script>

<div id="app">
  <div id="header">
    <div class="logo">✦ Now Streaming ✦</div>
    <h1>Lofi Vibes</h1>
  </div>

  <div id="player-card">
    <div id="album-art-wrap">
      <div id="album-art">☁️</div>
      <div id="loading-ring"></div>
    </div>

    <div id="song-info">
      <div id="song-title">Connecting to SoundCloud…</div>
      <div id="artist-name">lo-fi chill beats · SoundCloud</div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar-bg" id="progress-click">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="shuffle-btn" title="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
      <button class="ctrl-btn" id="prev-btn"    title="Previous"><i class="fa-solid fa-backward-step"></i></button>
      <button id="play-btn" disabled title="Play / Pause"><i class="fa-solid fa-play" id="play-icon"></i></button>
      <button class="ctrl-btn" id="next-btn"    title="Next"><i class="fa-solid fa-forward-step"></i></button>
      <button class="ctrl-btn" id="repeat-btn"  title="Toggle Repeat"><i class="fa-solid fa-repeat" id="repeat-icon"></i></button>
    </div>

    <div id="volume-row">
      <i class="fa-solid fa-volume-low"></i>
      <input type="range" id="volume-slider" min="0" max="100" value="80"/>
      <i class="fa-solid fa-volume-high"></i>
    </div>
  </div>

  <button id="vibe-btn">
    <span class="spin-icon">✦</span> CHANGE VIBE
  </button>

  <div id="footer">powered by SoundCloud Widget API &amp; Giphy · lofi aesthetic</div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────
const GIPHY_KEY   = 'SI1CeHewtSl3r3iZgD74tWuuVhBJTwRt';
const SEARCH_TAGS = ['lofi anime aesthetic','pixel art lofi','lofi chill anime','lofi aesthetic rain','anime lofi study'];

// Curated free/public lofi SoundCloud playlists
const SC_PLAYLISTS = [
  'https://soundcloud.com/sc-playlists/sets/lo-fi-chill-beats',
  'https://soundcloud.com/lofi-hip-hop-music/sets/lofi-hip-hop-music-best-of',
  'https://soundcloud.com/user-818845853/sets/lofi',
  'https://soundcloud.com/ambientlofi/sets/ambient-lofi',
  'https://soundcloud.com/chillhopdotcom/sets/chillhop-essentials-spring-2022',
];

const EMOJIS = ['☁️','🌙','🌸','☕','✨','🌧️','🍃','🎵','🌟','🏮'];

// ─────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────
const bgGif        = document.getElementById('bg-gif');
const playBtn      = document.getElementById('play-btn');
const playIcon     = document.getElementById('play-icon');
const albumArt     = document.getElementById('album-art');
const loadingRing  = document.getElementById('loading-ring');
const songTitle    = document.getElementById('song-title');
const artistName   = document.getElementById('artist-name');
const progressFill = document.getElementById('progress-bar-fill');
const progressBg   = document.getElementById('progress-bar-bg');
const timeCurrent  = document.getElementById('time-current');
const timeTotal    = document.getElementById('time-total');
const volumeSlider = document.getElementById('volume-slider');
const vibeBtn      = document.getElementById('vibe-btn');
const toast        = document.getElementById('toast');
const scIframe     = document.getElementById('sc-iframe');

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let isPlaying   = false;
let isReady     = false;
let repeatMode  = false;
let duration    = 0;
let widget      = null;
let progressRaf = null;

// ─────────────────────────────────────────
//  SOUNDCLOUD WIDGET INIT
// ─────────────────────────────────────────
function initWidget() {
  widget = SC.Widget(scIframe);

  widget.bind(SC.Widget.Events.READY, () => {
    isReady = true;
    playBtn.disabled = false;
    loadingRing.style.display = 'none';
    widget.setVolume(parseInt(volumeSlider.value));
    refreshSongInfo();
    showToastMsg('🎵 SoundCloud ready!');
  });

  widget.bind(SC.Widget.Events.PLAY, () => {
    isPlaying = true;
    playIcon.className = 'fa-solid fa-pause';
    albumArt.classList.add('playing');
    startProgressPoll();
    refreshSongInfo();
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    isPlaying = false;
    playIcon.className = 'fa-solid fa-play';
    albumArt.classList.remove('playing');
    stopProgressPoll();
  });

  widget.bind(SC.Widget.Events.FINISH, () => {
    if (repeatMode) {
      widget.seekTo(0);
      widget.play();
    } else {
      widget.next();
    }
  });

  widget.bind(SC.Widget.Events.PLAY_PROGRESS, (e) => {
    if (duration > 0) {
      const pct = (e.currentPosition / duration) * 100;
      progressFill.style.width = pct + '%';
      timeCurrent.textContent  = fmtTime(e.currentPosition);
    }
  });

  widget.bind(SC.Widget.Events.ERROR, () => {
    showToastMsg('⚠️ Track unavailable, skipping…');
    setTimeout(() => widget.next(), 1200);
  });
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function refreshSongInfo() {
  widget.getCurrentSound(s => {
    if (!s) return;
    const title  = s.title || 'Lofi Track';
    const artist = s.user  ? s.user.username : 'Unknown Artist';
    songTitle.textContent  = title;
    artistName.textContent = artist + ' · SoundCloud';
    albumArt.textContent   = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  });
  widget.getDuration(d => {
    duration = d;
    timeTotal.textContent = fmtTime(d);
  });
}

function fmtTime(ms) {
  const s   = Math.floor(ms / 1000);
  const m   = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function startProgressPoll() {
  stopProgressPoll();
  function tick() {
    widget.getPosition(pos => {
      if (duration > 0) {
        const pct = (pos / duration) * 100;
        progressFill.style.width = Math.min(pct, 100) + '%';
        timeCurrent.textContent  = fmtTime(pos);
      }
    });
    progressRaf = setTimeout(tick, 500);
  }
  tick();
}
function stopProgressPoll() {
  clearTimeout(progressRaf);
}

// ─────────────────────────────────────────
//  GIPHY BACKGROUND
// ─────────────────────────────────────────
async function fetchLofiGif() {
  const tag    = SEARCH_TAGS[Math.floor(Math.random() * SEARCH_TAGS.length)];
  const offset = Math.floor(Math.random() * 30);
  const url    = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(tag)}&limit=1&offset=${offset}&rating=g`;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.data && data.data[0]) return data.data[0].images.original.url;
  } catch(e) { console.warn('Giphy error', e); }
  return null;
}

async function setBackground(showToast = false) {
  vibeBtn.classList.add('loading');
  const gifUrl = await fetchLofiGif();
  if (gifUrl) {
    bgGif.classList.add('fade-out');
    setTimeout(() => {
      bgGif.style.backgroundImage = `url('${gifUrl}')`;
      bgGif.classList.remove('fade-out');
      if (showToast) showToastMsg('✦ New vibe loaded!');
    }, 700);
  } else if (showToast) showToastMsg('⚠️ Could not load vibe');
  setTimeout(() => vibeBtn.classList.remove('loading'), 700);
}

// ─────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────
function createParticles() {
  const c = document.getElementById('particles');
  const colors = ['#c9b8ff','#ffd6e7','#a8edea','#ffecd2'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    const sz = Math.random() * 5 + 2;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
      background:${colors[i%colors.length]};
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;`;
    c.appendChild(p);
  }
}

// ─────────────────────────────────────────
//  LOAD PLAYLIST
// ─────────────────────────────────────────
function loadPlaylist(url) {
  if (!widget) return;
  loadingRing.style.display = 'block';
  songTitle.textContent  = 'Loading playlist…';
  artistName.textContent = 'SoundCloud';
  widget.load(url, {
    auto_play: isPlaying,
    buying: false, sharing: false, download: false,
    show_artwork: false, show_playcount: false,
    show_user: false, hide_related: true, show_comments: false,
    callback: () => {
      loadingRing.style.display = 'none';
      refreshSongInfo();
      showToastMsg('🎶 Playlist loaded!');
    }
  });
}

// ─────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (!isReady) return;
  if (isPlaying) widget.pause(); else widget.play();
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (!isReady) return;
  widget.next();
  progressFill.style.width = '0%';
  timeCurrent.textContent  = '0:00';
});

document.getElementById('prev-btn').addEventListener('click', () => {
  if (!isReady) return;
  widget.prev();
  progressFill.style.width = '0%';
  timeCurrent.textContent  = '0:00';
});

document.getElementById('shuffle-btn').addEventListener('click', () => {
  if (!isReady) return;
  // Load random playlist for shuffle feel
  const url = SC_PLAYLISTS[Math.floor(Math.random() * SC_PLAYLISTS.length)];
  loadPlaylist(url);
  showToastMsg('🔀 Shuffled to new playlist!');
});

document.getElementById('repeat-btn').addEventListener('click', () => {
  repeatMode = !repeatMode;
  document.getElementById('repeat-icon').style.color = repeatMode ? 'var(--accent)' : 'var(--subtext)';
  showToastMsg(repeatMode ? '🔁 Repeat ON' : '🔁 Repeat OFF');
});

// Progress bar seek
progressBg.addEventListener('click', (e) => {
  if (!isReady || duration === 0) return;
  const rect = progressBg.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  widget.seekTo(Math.floor(pct * duration));
});

// Volume
volumeSlider.addEventListener('input', () => {
  if (widget) widget.setVolume(parseInt(volumeSlider.value));
});

// Change Vibe (GIF only)
vibeBtn.addEventListener('click', () => setBackground(true));

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToastMsg(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
createParticles();
setBackground(false);
loadingRing.style.display = 'block';
// SC widget API loads asynchronously with the iframe
setTimeout(initWidget, 500);
</script>
</body>
</html>
